version: 2

models:
  - name: fct_train_passages
    description: "En rad per tågpassage vid Svedala/Skurup/Lemmeströ, med riktning och försening."
    columns:
      - name: train_ident
        description: "Annonserat tågnummer (AdvertisedTrainIdent)."
        tests:
          - not_null
      - name: location_signature
        description: "Stationssignatur där passagen registreras (Sea/Srp/Lmm)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Sea', 'Srp', 'Lmm']
      - name: activity_type
        description: "Avgang eller Ankomst."
        tests:
          - accepted_values:
              arguments:
                values: ['Avgang', 'Ankomst']
      - name: direction
        description: "Härledd riktning; NULL för Lemmeströ (saknar From/To)."
        tests:
          - accepted_values:
              arguments:
                values: ['Mot Ystad/Simrishamn', 'Mot Malmö/Helsingborg']
      - name: train_type
        description: "Härlett tågslag (från dim_trains); gäller även Lemmeströ via tågnr+dag."
      - name: advertised_time
        description: "Tidtabellstid (AdvertisedTimeAtLocation)."
        tests:
          - not_null

  - name: dim_trains
    description: "Ett tåg per driftdag med härlett tågslag (Pågatåg/Öresundståg/Godståg/…)."
    columns:
      - name: train_ident
        tests:
          - not_null
      - name: train_type
        description: "Härlett tågslag."
        tests:
          - not_null

  - name: agg_passages_daily
    description: "Passager per driftdag, station, riktning och tågslag: antal tåg, inställda, snittförsening, andel i tid."
    columns:
      - name: operating_day
        tests:
          - not_null
